name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: |
          uv run ruff check .
          PYTHONPATH=. uv run mypy control_plane data_plane shared

      - name: Test
        env:
          PYTHONPATH: .
        run: uv run pytest tests/ -v
