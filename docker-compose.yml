services:
  control_plane:
    build:
      context: .
      dockerfile: control_plane/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PYTHONPATH=/app
      # Async Postgres URL for the Control Plane database
      - DATABASE_URL=postgresql+asyncpg://platform:platform@postgres:5432/platform
      # DEV PLACEHOLDER — generate a real key with:
      #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # Never commit production secrets.
      - ENCRYPTION_KEY=0gdkyDyOo3ekqTfcIBh3kdV1frqMM_ND1XjV4G8EYow=
      - ADMIN_API_KEY=dev-admin-key-change-in-prod
    depends_on:
      postgres:
        condition: service_started

  data_plane:
    build:
      context: .
      dockerfile: data_plane/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - PYTHONPATH=/app
      # Option A — local YAML config (legacy mode)
      # - TENANT_CONFIG_PATH=/app/config/tenant.yaml
      #
      # Option B — pull config from Control Plane at boot time
      # - CONTROL_PLANE_URL=http://control_plane:8001
      # - TENANT_ID=<your_tenant_id>
      # - BOOT_TOKEN=<your_boot_token>

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
