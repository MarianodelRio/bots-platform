services:
  control_plane:
    build:
      context: .
      dockerfile: control_plane/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PYTHONPATH=/app
      # Async Postgres URL for the Control Plane database
      - DATABASE_URL=postgresql+asyncpg://platform:platform@postgres:5432/platform
      # DEV PLACEHOLDER — generate a real key with:
      #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # Never commit production secrets.
      - ENCRYPTION_KEY=0gdkyDyOo3ekqTfcIBh3kdV1frqMM_ND1XjV4G8EYow=
      - ADMIN_API_KEY=dev-admin-key-change-in-prod
    depends_on:
      postgres:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  data_plane:
    build:
      context: .
      dockerfile: data_plane/Dockerfile
    ports:
      - "8002:8000"
    environment:
      - PYTHONPATH=/app
      - CONTROL_PLANE_URL=http://control_plane:8001
      - TENANT_ID=peluqueria_sur
      - BOOT_TOKEN=sur-boot-2024
      - STATE_DB_PATH=/data/state.db
    volumes:
      - dp1_state:/data
    depends_on:
      control_plane:
        condition: service_healthy

  data_plane_2:
    build:
      context: .
      dockerfile: data_plane/Dockerfile
    ports:
      - "8003:8000"
    environment:
      - PYTHONPATH=/app
      - CONTROL_PLANE_URL=http://control_plane:8001
      - TENANT_ID=peluqueria_norte
      - BOOT_TOKEN=norte-boot-2024
      - STATE_DB_PATH=/data/state.db
    volumes:
      - dp2_state:/data
    depends_on:
      control_plane:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  dp1_state:
  dp2_state:
